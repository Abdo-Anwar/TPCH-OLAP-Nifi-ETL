version: '3.8'

services:

  # ─────────────────────────────────────────
  # MySQL  (OLTP source)
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: tpch_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: tpch
      MYSQL_USER: tpch_user
      MYSQL_PASSWORD: tpch1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d   # drop DDL/seed SQL here
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot1234"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────
  # Apache NiFi 2.x  (ETL)
  # ─────────────────────────────────────────
  nifi:
    image: apache/nifi:2.0.0          # Java-21-based image
    container_name: tpch_nifi
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8443:8443"                    # HTTPS UI  →  https://localhost:8443/nifi
    environment:
      NIFI_WEB_HTTPS_PORT: "8443"
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: adminadminadmin   # min 12 chars
    volumes:
      - nifi_data:/opt/nifi/nifi-current/data
      - nifi_logs:/opt/nifi/nifi-current/logs
      - nifi_conf:/opt/nifi/nifi-current/conf
      - ./nifi-drivers:/opt/nifi/nifi-current/drivers   # put MySQL JDBC jar here
      - ./parquet-output:/opt/nifi/parquet-output        # NiFi writes Parquet here
    healthcheck:
      test: ["CMD-SHELL", "curl -kfs https://localhost:8443/nifi/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ─────────────────────────────────────────
  # Apache Spark (OLAP engine)
  # Using bitnami image – comes with Spark + PySpark ready
  # ─────────────────────────────────────────
  spark-master:
      image: apache/spark:3.5.6
      container_name: tpch_spark_master
      restart: unless-stopped
      command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      environment:
        SPARK_MASTER_WEBUI_PORT: "8080"
      ports:
        - "8080:8080"
        - "7077:7077"
      volumes:
        - ./parquet-output:/data/parquet
        - ./spark-jobs:/opt/spark-jobs

  spark-worker:
    image: apache/spark:3.5.6
    container_name: tpch_spark_worker
    restart: unless-stopped
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: "2"
    ports:
      - "8081:8081"
    volumes:
      - ./parquet-output:/data/parquet
      - ./spark-jobs:/opt/spark-jobs

volumes:
  mysql_data:
  nifi_data:
  nifi_logs:
  nifi_conf:
